name: ci


permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    paths:
      - 'articles/**'
      - 'content-hub/**'
      - 'note/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - '.markdownlint-cli2.jsonc'
      - '.textlintrc.json'
      - '.textlintignore'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Zenn articles (frontmatter / build)
        run: npm run lint:zenn

      - name: Lint Markdown
        run: npm run lint:md

      - name: Lint Japanese prose (textlint)
        run: npm run lint:text

      - name: Test note pipeline
        run: npm run test:pipeline
